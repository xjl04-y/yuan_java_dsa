<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三数之和 (3Sum) 算法可视化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .code-font { font-family: 'JetBrains Mono', monospace; }

        /* 数组块的基本样式和过渡动画 */
        .array-block {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 指针的高亮状态 */
        .pointer-i { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); transform: translateY(-4px); }
        .pointer-left { border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); transform: translateY(-4px); }
        .pointer-right { border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); transform: translateY(-4px); }

        /* 找到目标时的脉冲动画 */
        @keyframes pulse-success {
            0%, 100% { box-shadow: 0 0 15px rgba(234, 179, 8, 0.5); border-color: #eab308; }
            50% { box-shadow: 0 0 25px rgba(234, 179, 8, 0.8); border-color: #fde047; }
        }
        .match-found { animation: pulse-success 1s infinite; background-color: rgba(234, 179, 8, 0.2); }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-8">

<div class="w-full max-w-5xl space-y-6">
    <header class="text-center space-y-2">
        <h1 class="text-3xl sm:text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
            三数之和 (3Sum) 算法可视化
        </h1>
        <p class="text-slate-400 text-sm sm:text-base">通过动态指针观察 O(N²) 最优解与去重逻辑</p>
    </header>

    <!-- 控制面板 -->
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 sm:p-6 shadow-xl flex flex-col gap-4">
        <div class="flex flex-col sm:flex-row gap-4 items-center">
            <div class="flex-1 w-full relative">
                <label class="text-xs text-slate-400 absolute -top-2.5 left-3 bg-slate-800 px-1">自定义输入数组 (支持逗号或空格分隔)</label>
                <input type="text" id="arrayInput" value="-1, 0, 1, 2, -1, -4"
                       class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors code-font">
            </div>
            <button id="btnReset" class="w-full sm:w-auto px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-lg shadow-blue-500/30 transition-all active:scale-95">
                重新加载
            </button>
        </div>

        <div class="flex flex-wrap items-center justify-center sm:justify-start gap-3 mt-2 border-t border-slate-700 pt-4">
            <button id="btnAutoPlay" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded-md shadow-lg shadow-emerald-500/30 transition-all flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                自动播放
            </button>
            <button id="btnPause" class="hidden px-5 py-2 bg-amber-600 hover:bg-amber-500 text-white font-medium rounded-md shadow-lg shadow-amber-500/30 transition-all flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                暂停
            </button>
            <button id="btnStep" class="px-5 py-2 bg-slate-700 hover:bg-slate-600 text-white font-medium rounded-md border border-slate-600 transition-all flex items-center gap-2">
                下一步
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>

            <div class="ml-auto text-sm text-slate-400 flex items-center gap-4">
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-blue-500"></span> 基准(index)</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-emerald-500"></span> 左(left)</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-500"></span> 右(right)</span>
            </div>
        </div>

        <div id="errorMsg" class="hidden text-red-400 text-sm font-medium"></div>
    </div>

    <!-- 可视化展示区 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- 数组与动画区 -->
        <div class="lg:col-span-2 bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-xl flex flex-col">
            <h2 class="text-lg font-semibold text-slate-200 mb-6 flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                数组状态
            </h2>

            <!-- 数组容器 -->
            <div id="arrayContainer" class="flex flex-wrap justify-center gap-2 sm:gap-4 mb-8 min-h-[100px] items-end">
                <!-- 动态生成数组方块 -->
            </div>

            <!-- 逻辑讲解面板 -->
            <div class="mt-auto bg-slate-900 rounded-xl p-5 border border-slate-700">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-sm font-semibold text-slate-400 uppercase tracking-wider">算法推演日志</span>
                    <span id="speedIndicator" class="text-xs text-indigo-400 font-medium"></span>
                </div>
                <div id="logText" class="text-base sm:text-lg text-slate-200 code-font min-h-[80px] leading-relaxed">
                    等待初始化...
                </div>
            </div>
        </div>

        <!-- 结果与变量监控区 -->
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-xl flex flex-col">
            <h2 class="text-lg font-semibold text-slate-200 mb-4 border-b border-slate-700 pb-2">计算变量</h2>
            <div class="space-y-4 mb-6 code-font text-sm">
                <div class="flex justify-between bg-slate-900 p-2 rounded">
                    <span class="text-slate-400">nums[index] :</span>
                    <span id="varIndex" class="text-blue-400 font-bold">-</span>
                </div>
                <div class="flex justify-between bg-slate-900 p-2 rounded">
                    <span class="text-slate-400">nums[left] :</span>
                    <span id="varLeft" class="text-emerald-400 font-bold">-</span>
                </div>
                <div class="flex justify-between bg-slate-900 p-2 rounded">
                    <span class="text-slate-400">nums[right] :</span>
                    <span id="varRight" class="text-red-400 font-bold">-</span>
                </div>
                <div class="flex justify-between bg-slate-700 p-2 rounded border border-slate-600">
                    <span class="text-slate-200 font-semibold">Current Sum :</span>
                    <span id="varSum" class="text-white font-bold text-base">-</span>
                </div>
            </div>

            <h2 class="text-lg font-semibold text-slate-200 mb-4 border-b border-slate-700 pb-2 flex justify-between items-center">
                <span>收集到的结果</span>
                <span id="resultCount" class="text-xs bg-indigo-600 px-2 py-1 rounded-full text-white">0</span>
            </h2>
            <div id="resultsContainer" class="flex-1 bg-slate-900 rounded-xl p-4 overflow-y-auto border border-slate-700 max-h-[250px] space-y-2 code-font text-sm">
                <!-- 动态生成结果 -->
            </div>
        </div>
    </div>
</div>

<script>
    // DOM 元素引用
    const elements = {
        input: document.getElementById('arrayInput'),
        btnReset: document.getElementById('btnReset'),
        btnAutoPlay: document.getElementById('btnAutoPlay'),
        btnPause: document.getElementById('btnPause'),
        btnStep: document.getElementById('btnStep'),
        errorMsg: document.getElementById('errorMsg'),
        arrayContainer: document.getElementById('arrayContainer'),
        logText: document.getElementById('logText'),
        varIndex: document.getElementById('varIndex'),
        varLeft: document.getElementById('varLeft'),
        varRight: document.getElementById('varRight'),
        varSum: document.getElementById('varSum'),
        resultsContainer: document.getElementById('resultsContainer'),
        resultCount: document.getElementById('resultCount'),
    };

    // 算法状态全局变量
    let currentRunId = 0;
    let isAutoPlaying = false;
    let resolveStep = null;
    let delayMs = 1200; // 自动播放延迟

    // 解析输入数组：更宽容的格式
    function parseInput() {
        const rawStr = elements.input.value;
        // 支持中文逗号、英文逗号、空格的任意混合
        const parsed = rawStr.split(/[,，\s]+/)
            .map(s => parseInt(s.trim()))
            .filter(n => !isNaN(n));

        if (parsed.length < 3) {
            showError("数组至少需要 3 个有效数字！");
            return null;
        }
        if (parsed.length > 20) {
            showError("为了最佳演示效果，建议数组长度不超过 20。");
            return null;
        }
        hideError();
        return parsed;
    }

    // 错误提示控制
    function showError(msg) {
        elements.errorMsg.textContent = msg;
        elements.errorMsg.classList.remove('hidden');
    }
    function hideError() {
        elements.errorMsg.classList.add('hidden');
    }

    // UI 渲染：初始化数组方块
    function renderArrayBlock(nums) {
        elements.arrayContainer.innerHTML = '';
        nums.forEach((num, idx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col items-center gap-1 relative';
            wrapper.id = `wrapper-${idx}`;

            // 顶部的指针标记 (index)
            const topMarker = document.createElement('div');
            topMarker.id = `marker-top-${idx}`;
            topMarker.className = 'text-xs font-bold text-blue-400 opacity-0 transition-opacity h-4';
            topMarker.textContent = 'i';

            // 中间的数据块
            const box = document.createElement('div');
            box.id = `box-${idx}`;
            box.className = 'array-block w-12 h-12 sm:w-14 sm:h-14 bg-slate-700 border-2 border-slate-600 rounded-xl flex items-center justify-center text-lg sm:text-xl font-bold code-font';
            box.textContent = num;

            // 底部的指针标记 (left/right)
            const bottomMarker = document.createElement('div');
            bottomMarker.id = `marker-bot-${idx}`;
            bottomMarker.className = 'text-xs font-bold opacity-0 transition-opacity h-4';

            wrapper.appendChild(topMarker);
            wrapper.appendChild(box);
            wrapper.appendChild(bottomMarker);
            elements.arrayContainer.appendChild(wrapper);
        });
    }

    // UI 渲染：更新指针和变量状态
    function updatePointersUI(nums, idx, left, right, sum = null, isMatch = false) {
        // 重置所有样式
        document.querySelectorAll('.array-block').forEach(el => {
            el.classList.remove('pointer-i', 'pointer-left', 'pointer-right', 'match-found');
        });
        document.querySelectorAll('[id^="marker-top-"]').forEach(el => el.style.opacity = '0');
        document.querySelectorAll('[id^="marker-bot-"]').forEach(el => {
            el.style.opacity = '0';
            el.textContent = '';
            el.className = 'text-xs font-bold opacity-0 transition-opacity h-4';
        });

        // 更新变量面板
        elements.varIndex.textContent = idx >= 0 ? nums[idx] : '-';
        elements.varLeft.textContent = left >= 0 ? nums[left] : '-';
        elements.varRight.textContent = right >= 0 ? nums[right] : '-';

        if (sum !== null) {
            elements.varSum.textContent = sum;
            if (sum === 0) elements.varSum.className = 'text-amber-400 font-bold text-xl drop-shadow-[0_0_8px_rgba(251,191,36,0.8)]';
            else if (sum < 0) elements.varSum.className = 'text-blue-300 font-bold text-lg';
            else elements.varSum.className = 'text-red-300 font-bold text-lg';
        } else {
            elements.varSum.textContent = '-';
            elements.varSum.className = 'text-white font-bold text-base';
        }

        // 应用高亮 (按优先级渲染)
        if (idx >= 0 && idx < nums.length) {
            const box = document.getElementById(`box-${idx}`);
            const topM = document.getElementById(`marker-top-${idx}`);
            if (box) box.classList.add('pointer-i');
            if (topM) topM.style.opacity = '1';
        }
        if (left >= 0 && left < nums.length) {
            const box = document.getElementById(`box-${left}`);
            const botM = document.getElementById(`marker-bot-${left}`);
            if (box) box.classList.add('pointer-left');
            if (botM) {
                botM.style.opacity = '1';
                botM.textContent = 'L';
                botM.classList.add('text-emerald-400');
            }
        }
        if (right >= 0 && right < nums.length) {
            const box = document.getElementById(`box-${right}`);
            const botM = document.getElementById(`marker-bot-${right}`);
            if (left === right) {
                box.classList.remove('pointer-left');
                box.style.borderColor = '#a855f7';
                botM.textContent = 'L & R';
                botM.classList.add('text-purple-400');
            } else {
                if (box) box.classList.add('pointer-right');
                if (botM) {
                    botM.style.opacity = '1';
                    botM.textContent = 'R';
                    botM.classList.add('text-red-400');
                }
            }
        }

        if (isMatch && idx >= 0 && left >= 0 && right >= 0) {
            document.getElementById(`box-${idx}`).classList.add('match-found');
            document.getElementById(`box-${left}`).classList.add('match-found');
            document.getElementById(`box-${right}`).classList.add('match-found');
        }
    }

    function writeLog(html) {
        elements.logText.innerHTML = html;
    }

    function addResult(triplet) {
        const div = document.createElement('div');
        div.className = 'bg-slate-800 p-2 rounded border border-slate-600 text-amber-300 font-bold flex justify-center animate-pulse';
        div.textContent = `[ ${triplet.join(', ')} ]`;
        elements.resultsContainer.appendChild(div);
        elements.resultCount.textContent = elements.resultsContainer.children.length;

        setTimeout(() => div.classList.remove('animate-pulse'), 1000);
        elements.resultsContainer.scrollTop = elements.resultsContainer.scrollHeight;
    }

    async function waitNext() {
        if (isAutoPlaying) {
            await new Promise(r => setTimeout(r, delayMs));
        } else {
            await new Promise(r => resolveStep = r);
        }
    }

    async function run3SumAlgorithm(nums, runId) {
        // 【核心修改】先在此暂停，让用户看清楚新加载的“未排序”原始数据
        await waitNext();
        if (runId !== currentRunId) return;

        // 1. 排序
        writeLog(`<span class="text-amber-400 font-bold">准备阶段：</span>首要任务是对数组进行升序排序。<br/>这是对撞指针判定方向的基础！`);
        nums.sort((a, b) => a - b);
        renderArrayBlock(nums);
        await waitNext();
        if (runId !== currentRunId) return;

        // 开始外层循环
        for (let i = 0; i < nums.length - 2; i++) {

            // 外层去重
            if (i > 0 && nums[i] === nums[i - 1]) {
                updatePointersUI(nums, i, -1, -1);
                writeLog(`<span class="text-red-400">检测到重复的固定值</span> nums[${i}] = ${nums[i]} 与上一个相同。为避免重复结果，<strong class="text-white">跳过此次循环！</strong>`);
                await waitNext();
                if (runId !== currentRunId) return;
                continue;
            }

            let left = i + 1;
            let right = nums.length - 1;

            updatePointersUI(nums, i, left, right);
            writeLog(`固定基准值 <span class="text-blue-400 font-bold">i=${nums[i]}</span>。初始化双指针：<span class="text-emerald-400 font-bold">L</span> 在下一位，<span class="text-red-400 font-bold">R</span> 在末尾。`);
            await waitNext();
            if (runId !== currentRunId) return;

            // 内层循环
            while (left < right) {
                let sum = nums[i] + nums[left] + nums[right];
                updatePointersUI(nums, i, left, right, sum);

                writeLog(`计算和: <span class="text-blue-400">${nums[i]}</span> + <span class="text-emerald-400">${nums[left]}</span> + <span class="text-red-400">${nums[right]}</span> = <strong class="text-xl">${sum}</strong>`);
                await waitNext();
                if (runId !== currentRunId) return;

                if (sum === 0) {
                    updatePointersUI(nums, i, left, right, sum, true);
                    writeLog(`<span class="text-amber-400 font-bold text-xl">🎉 发现目标 0！</span> 收集这组解，准备寻找下一组。`);
                    addResult([nums[i], nums[left], nums[right]]);
                    await waitNext();
                    if (runId !== currentRunId) return;

                    // 左指针去重
                    while (left < right && nums[left] === nums[left + 1]) {
                        left++;
                        updatePointersUI(nums, i, left, right, null);
                        writeLog(`⚠️ L 指针右侧的数字 <span class="text-emerald-400">${nums[left]}</span> 相同，<strong class="text-white">跳过以防重复</strong>。 L++`);
                        await waitNext();
                        if (runId !== currentRunId) return;
                    }
                    // 右指针去重
                    while (left < right && nums[right] === nums[right - 1]) {
                        right--;
                        updatePointersUI(nums, i, left, right, null);
                        writeLog(`⚠️ R 指针左侧的数字 <span class="text-red-400">${nums[right]}</span> 相同，<strong class="text-white">跳过以防重复</strong>。 R--`);
                        await waitNext();
                        if (runId !== currentRunId) return;
                    }

                    left++;
                    right--;
                    if (left < right) {
                        updatePointersUI(nums, i, left, right, null);
                        writeLog(`去重完毕。双指针同时向中间收缩：<span class="text-emerald-400">L++</span> 且 <span class="text-red-400">R--</span>，继续探索。`);
                        await waitNext();
                        if (runId !== currentRunId) return;
                    }

                } else if (sum < 0) {
                    writeLog(`和 (<strong class="text-blue-300">${sum}</strong>) 小于 0。<br/>因为数组是有序的，我们需要<strong class="text-emerald-400">更大的数</strong>。让左指针向右移动（<span class="text-emerald-400">L++</span>）。`);
                    left++;
                    if (left < right) {
                        updatePointersUI(nums, i, left, right, null);
                        await waitNext();
                        if (runId !== currentRunId) return;
                    }
                } else {
                    writeLog(`和 (<strong class="text-red-300">${sum}</strong>) 大于 0。<br/>因为数组是有序的，我们需要<strong class="text-red-400">更小的数</strong>。让右指针向左移动（<span class="text-red-400">R--</span>）。`);
                    right--;
                    if (left < right) {
                        updatePointersUI(nums, i, left, right, null);
                        await waitNext();
                        if (runId !== currentRunId) return;
                    }
                }
            }
        }

        updatePointersUI(nums, -1, -1, -1);
        writeLog(`<span class="text-emerald-400 font-bold text-xl">✅ 算法执行完毕！</span> 所有组合检查完成。`);
        togglePlayMode(false);
        elements.btnStep.disabled = true;
        elements.btnStep.classList.add('opacity-50', 'cursor-not-allowed');
    }

    function togglePlayMode(play) {
        isAutoPlaying = play;
        if (play) {
            elements.btnAutoPlay.classList.add('hidden');
            elements.btnPause.classList.remove('hidden');
            elements.btnStep.classList.add('opacity-50', 'pointer-events-none');
            if (resolveStep) {
                let resume = resolveStep;
                resolveStep = null;
                resume();
            }
        } else {
            elements.btnAutoPlay.classList.remove('hidden');
            elements.btnPause.classList.add('hidden');
            elements.btnStep.classList.remove('opacity-50', 'pointer-events-none');
        }
    }

    function initApp() {
        const nums = parseInput();
        if (!nums) return;

        currentRunId++; // 使得之前的协程死亡

        // 安全释放上一次被阻塞在 await 里的旧任务
        if (resolveStep) {
            let resume = resolveStep;
            resolveStep = null;
            resume();
        }

        isAutoPlaying = false;

        elements.resultsContainer.innerHTML = '';
        elements.resultCount.textContent = '0';
        elements.btnStep.disabled = false;
        elements.btnStep.classList.remove('opacity-50', 'cursor-not-allowed');
        togglePlayMode(false);

        renderArrayBlock(nums);
        updatePointersUI(nums, -1, -1, -1);

        // 提示发生了修改
        writeLog('原始数组已就绪。点击 <strong class="text-white bg-slate-700 px-2 py-1 rounded">下一步</strong> 观察算法对数组进行排序。');

        run3SumAlgorithm(nums, currentRunId);
    }

    // 事件绑定
    elements.btnReset.addEventListener('click', initApp);

    // 支持回车刷新
    elements.input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') initApp();
    });

    // 支持失去焦点时（即点击其他地方）自动刷新
    elements.input.addEventListener('change', initApp);

    elements.btnAutoPlay.addEventListener('click', () => { togglePlayMode(true); });
    elements.btnPause.addEventListener('click', () => { togglePlayMode(false); });

    elements.btnStep.addEventListener('click', () => {
        if (resolveStep) {
            let next = resolveStep;
            resolveStep = null;
            next();
        }
    });

    // 页面加载启动
    initApp();
</script>
</body>
</html>
